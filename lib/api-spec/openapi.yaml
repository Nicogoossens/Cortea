openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SOWISO Etiquette API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile management
  - name: culture
    description: Culture protocols and compass data
  - name: scenarios
    description: Training scenarios for The Atelier
  - name: noble-score
    description: Noble Score and progression tracking
  - name: translations
    description: Multi-language support

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get current user profile
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
          description: Optional user identifier; bearer token is the source of truth.
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProfile
      tags: [users]
      summary: Create or update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileBody"
      responses:
        "200":
          description: Profile created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchProfilePreferences
      tags: [users]
      summary: Patch user preferences (language and active region)
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
          description: User identifier; must match the authenticated session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProfilePreferencesBody"
      responses:
        "200":
          description: Profile preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProfile
      tags: [users]
      summary: Delete user profile
      responses:
        "200":
          description: Profile deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile/region:
    patch:
      operationId: updateActiveRegion
      tags: [users]
      summary: Update the user's active region
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRegionBody"
      responses:
        "200":
          description: Region updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /culture/origins:
    get:
      operationId: getCulturalOrigins
      tags: [culture]
      summary: Get historical and cultural origin records for a region
      parameters:
        - name: region_code
          in: query
          required: true
          schema:
            type: string
          description: ISO country code (e.g. GB, CN, CA)
        - name: domain
          in: query
          required: false
          schema:
            type: string
            enum: [dining, business, greetings, gift-giving, dress]
          description: Filter by domain. Omit for all domains.
      responses:
        "200":
          description: Cultural origin records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CulturalOrigin"
        "400":
          description: Missing or invalid region code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /culture/protocols:
    get:
      operationId: getCultureProtocols
      tags: [culture]
      summary: Get culture protocols for a region and pillar
      parameters:
        - name: region_code
          in: query
          required: true
          schema:
            type: string
          description: ISO country code (e.g. GB, CN, CA)
        - name: pillar
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
          description: Pillar number (1-5). Omit for all pillars.
        - name: context
          in: query
          required: false
          schema:
            type: string
            enum: [business, social, general]
        - name: pillar_code
          in: query
          required: false
          schema:
            type: string
            enum: [Z1, Z2, Z3, Z4, Z5]
          description: Filter to verified CC Screening records under a single 5-pillar code (Z1-Z5).
        - name: verified_only
          in: query
          required: false
          schema:
            type: boolean
          description: When true, only verified CC Screening records (verified = true, source_book set) are returned.
        - name: locale
          in: query
          required: false
          schema:
            type: string
          description: BCP 47 locale; resolves rule_cc_i18n into display_rule.
        - name: situational_interests
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated sphere keys (e.g. business,gastronomy) used to sort matching contexts to the top.
      responses:
        "200":
          description: Culture protocols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CultureProtocol"

  /culture/compass:
    get:
      operationId: getCultureCompass
      tags: [culture]
      summary: Get cultural compass summary for all available regions
      parameters:
        - name: locale
          in: query
          required: false
          schema:
            type: string
          description: "BCP 47 locale code (e.g. en-GB, en-US, nl-NL, fr-FR). Defaults to en-GB."
      responses:
        "200":
          description: Cultural compass data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CultureCompassEntry"

  /culture/compass/{regionCode}:
    get:
      operationId: getCultureCompassRegion
      tags: [culture]
      summary: Get detailed cultural compass for a specific region
      parameters:
        - name: regionCode
          in: path
          required: true
          schema:
            type: string
        - name: locale
          in: query
          required: false
          schema:
            type: string
          description: "BCP 47 locale code (e.g. en-GB, en-US, nl-NL, fr-FR). Defaults to en-GB."
      responses:
        "200":
          description: Cultural compass detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CultureCompassDetail"
        "404":
          description: Region not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios:
    get:
      operationId: getScenarios
      tags: [scenarios]
      summary: Get training scenarios filtered by region, pillar, and difficulty
      parameters:
        - name: region_code
          in: query
          required: false
          schema:
            type: string
        - name: pillar
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: difficulty_level
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: difficulty_max
          in: query
          required: false
          description: Return scenarios with difficulty_level up to this value (inclusive)
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: age_group
          in: query
          required: false
          schema:
            type: string
            enum: ["18-30", "30-55", "55+"]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scenario"

  /scenarios/{scenarioId}:
    get:
      operationId: getScenario
      tags: [scenarios]
      summary: Get a specific scenario by ID
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: integer
        - name: lang
          in: query
          required: false
          description: ISO 639-1 language code for scenario content localization
          schema:
            type: string
      responses:
        "200":
          description: Scenario detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /noble-score:
    get:
      operationId: getNobleScore
      tags: [noble-score]
      summary: Get the current user's Noble Score and progression
      responses:
        "200":
          description: Noble Score data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NobleScoreData"

  /noble-score/submit:
    post:
      operationId: submitScenarioAnswer
      tags: [noble-score]
      summary: Submit a scenario answer and update Noble Score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAnswerBody"
      responses:
        "200":
          description: Answer result with score update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"

  /noble-score/log:
    get:
      operationId: getNobleScoreLog
      tags: [noble-score]
      summary: Get recent Noble Score events for the current user
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Score log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoreLogEntry"

  /noble-score/pillars:
    get:
      operationId: getPillarProgress
      tags: [noble-score]
      summary: Get per-pillar score and titles for the current user
      responses:
        "200":
          description: Per-pillar progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PillarProgress"

  /learning-tracks/session:
    get:
      operationId: getLearningTrackSession
      tags: [culture]
      summary: Get a learning track session for the current user
      parameters:
        - name: register
          in: query
          required: true
          schema:
            type: string
            enum: [middle_class, elite]
        - name: research_pillar
          in: query
          required: false
          schema:
            type: string
        - name: phase
          in: query
          required: true
          schema:
            type: integer
        - name: region_code
          in: query
          required: true
          schema:
            type: string
        - name: lang
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Learning track session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningTrackSession"

  /learning-tracks/answer:
    post:
      operationId: postLearningTrackAnswer
      tags: [culture]
      summary: Submit an answer to a learning track question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LearningTrackAnswerBody"
      responses:
        "200":
          description: Answer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningTrackAnswerResult"

  /learning-tracks/progress:
    get:
      operationId: getLearningTrackProgress
      tags: [culture]
      summary: Get learning track progress for the current user
      responses:
        "200":
          description: Progress records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LearningTrackProgress"

  /learning-tracks/badges:
    get:
      operationId: getLearningTrackBadges
      tags: [culture]
      summary: Get badges earned by the current user
      responses:
        "200":
          description: User badges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserBadge"

  /learning-tracks/next:
    get:
      operationId: getLearningTrackNext
      tags: [culture]
      summary: Auto-derived next slot in the prescribed sequence
      parameters:
        - name: register
          in: query
          required: true
          schema:
            type: string
            enum: [middle_class, elite]
        - name: region_code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Next prescribed slot for this user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningTrackNextSlot"

  /learning-tracks/limits:
    get:
      operationId: getLearningTrackLimits
      tags: [culture]
      summary: Daily limit and cooldown status for both registers
      responses:
        "200":
          description: Limit status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearningTrackLimits"

  /users/country-interests:
    get:
      operationId: getCountryInterests
      tags: [users]
      summary: List the current user's active country-of-interest entries
      responses:
        "200":
          description: Active country interests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserCountryInterest"
    post:
      operationId: addCountryInterest
      tags: [users]
      summary: Add or re-activate a country of interest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                region_code:
                  type: string
              required: [region_code]
      responses:
        "201":
          description: Country interest added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCountryInterest"

  /users/country-interests/{region_code}:
    delete:
      operationId: removeCountryInterest
      tags: [users]
      summary: Soft-hide a country of interest (per-region progress is preserved)
      parameters:
        - name: region_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Country interest hidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  region_code:
                    type: string
                  hidden_at:
                    type: string
                    format: date-time
                required: [region_code, hidden_at]

  /learning-tracks/badges/available:
    get:
      operationId: getLearningTrackBadgesAvailable
      tags: [culture]
      summary: Get all available badges in the catalogue
      responses:
        "200":
          description: Badge catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserBadge"

  /translations:
    get:
      operationId: getTranslations
      tags: [translations]
      summary: Get UI translations for a language
      parameters:
        - name: language_code
          in: query
          required: true
          schema:
            type: string
          description: ISO 639-1 language code (e.g. en, fr, de)
      responses:
        "200":
          description: Translation key-value map
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        id:
          type: string
        full_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        email_verified:
          type: boolean
        birth_year:
          type: integer
          nullable: true
        gender_identity:
          type: string
          nullable: true
        gender_expression:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
          description: Computed alias for gender_identity
        age_group:
          type: string
          nullable: true
          description: Computed from birth_year (e.g. "18-25", "26-35")
        noble_score:
          type: integer
        ambition_level:
          type: string
          enum: [casual, professional, diplomatic]
        subscription_tier:
          type: string
          enum: [guest, traveller, ambassador]
        subscription_status:
          type: string
        language_code:
          type: string
        active_region:
          type: string
        region_history:
          type: array
          items:
            type: string
        is_admin:
          type: boolean
        suspended_at:
          type: string
          format: date-time
          nullable: true
        onboarding_completed:
          type: boolean
        country_of_origin:
          type: string
          nullable: true
        country_of_origin_locked_at:
          type: string
          format: date-time
          nullable: true
        situational_interests:
          type: array
          items:
            type: string
        objectives:
          type: array
          items:
            type: string
        interests_sports:
          type: array
          items:
            type: string
        interests_cuisine:
          type: array
          items:
            type: string
        interests_dress_code:
          type: array
          items:
            type: string
        payment_customer_id:
          type: string
          nullable: true
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        calling_card_tagline:
          type: string
          nullable: true
          maxLength: 100
          description: Optional personalised tagline shown on the Ambassador's Digital Calling Card
      required:
        - id
        - email_verified
        - noble_score
        - ambition_level
        - subscription_tier
        - subscription_status
        - language_code
        - active_region
        - region_history
        - is_admin
        - onboarding_completed
        - objectives
        - interests_sports
        - interests_cuisine
        - interests_dress_code
        - created_at

    CreateProfileBody:
      type: object
      properties:
        birth_year:
          type: integer
          nullable: true
        gender_identity:
          type: string
          nullable: true
        gender_expression:
          type: string
          nullable: true
        ambition_level:
          type: string
          enum: [casual, professional, diplomatic]
        language_code:
          type: string
        active_region:
          type: string
      required:
        - id

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    UpdateProfileBody:
      type: object
      properties:
        birth_year:
          type: integer
          nullable: true
        gender_identity:
          type: string
          nullable: true
        gender_expression:
          type: string
          nullable: true
        ambition_level:
          type: string
          enum: [casual, professional, diplomatic]
        language_code:
          type: string
        active_region:
          type: string
        subscription_tier:
          type: string
          enum: [guest, traveller, ambassador]
        calling_card_tagline:
          type: string
          nullable: true
          maxLength: 100
          description: Optional personalised tagline shown on the Ambassador's Digital Calling Card

    UpdateRegionBody:
      type: object
      properties:
        region_code:
          type: string
      required:
        - region_code

    PatchProfilePreferencesBody:
      type: object
      properties:
        language_code:
          type: string
          description: BCP-47 base language code (e.g. en, nl, fr).
        active_region:
          type: string
          description: ISO 3166-1 alpha-2 region code (e.g. GB, NL, US).

    CulturalOrigin:
      type: object
      properties:
        id:
          type: integer
        region_code:
          type: string
        domain:
          type: string
        tradition:
          type: string
        origin_summary:
          type: string
        era:
          type: string
        influences:
          type: array
          items:
            type: string
        connected_rule:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - region_code
        - domain
        - tradition
        - origin_summary
        - era
        - influences
        - connected_rule

    CultureProtocol:
      type: object
      properties:
        id:
          type: integer
        region_code:
          type: string
        pillar:
          type: integer
        rule_type:
          type: string
        rule_description:
          type: string
        gender_applicability:
          type: string
          enum: [all, masculine, feminine, fluid]
        context:
          type: string
          enum: [business, social, general, formal, dining]
        display_rule:
          type: string
          description: Locale-aware display text. Falls back to rule_cc, then rule_description.
        pillar_code:
          type: string
          enum: [Z1, Z2, Z3, Z4, Z5]
          nullable: true
          description: CC Screening Worker 5-pillar code.
        subcategory:
          type: string
          nullable: true
        rule_cc:
          type: string
          nullable: true
          description: C&C mentor-formulation, used as the display rule when present.
        urgency:
          type: integer
          minimum: 1
          maximum: 3
          nullable: true
          description: 1 = nice-to-know, 2 = important, 3 = critical (First Aid).
        verified:
          type: boolean
          nullable: true
        source_book:
          type: string
          nullable: true
      required:
        - id
        - region_code
        - pillar
        - rule_type
        - rule_description
        - gender_applicability
        - context

    CultureCompassEntry:
      type: object
      properties:
        region_code:
          type: string
        region_name:
          type: string
        core_value:
          type: string
        biggest_taboo:
          type: string
        flag_emoji:
          type: string
        has_content:
          type: boolean
          description: "True when this region has at least one locale of compass content ready."
        sphere_highlights:
          type: array
          description: "Situational interest spheres (e.g. business, leisure) for which this region currently has dedicated highlight content."
          items:
            type: string
      required:
        - region_code
        - region_name
        - core_value
        - biggest_taboo
        - flag_emoji
        - has_content

    CultureCompassDetail:
      type: object
      properties:
        region_code:
          type: string
        region_name:
          type: string
        flag_emoji:
          type: string
        core_value:
          type: string
        biggest_taboo:
          type: string
        dining_etiquette:
          type: string
        language_notes:
          type: string
        gift_protocol:
          type: string
        dress_code:
          type: string
        dos:
          type: array
          items:
            type: string
        donts:
          type: array
          items:
            type: string
        mehrabian_weight:
          type: object
          properties:
            nonverbal:
              type: number
            tone:
              type: number
            words:
              type: number
            note:
              type: string
          required:
            - nonverbal
            - tone
            - words
        sphere_highlights:
          type: array
          description: "Compass field names that include sphere-specific highlight content for the requested situational interests (e.g. dining_etiquette, dress_code)."
          items:
            type: string
      required:
        - region_code
        - region_name
        - flag_emoji
        - core_value
        - biggest_taboo
        - dining_etiquette
        - language_notes
        - gift_protocol
        - dress_code
        - dos
        - donts

    Scenario:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        pillar:
          type: integer
        region_code:
          type: string
        age_group:
          type: string
        difficulty_level:
          type: integer
        estimated_minutes:
          type: integer
        noble_score_impact:
          type: integer
        is_regional:
          type: boolean
          description: True when the scenario belongs to the requested region; false when it is a universal fallback.
        content_json:
          $ref: "#/components/schemas/ScenarioContent"
      required:
        - id
        - title
        - pillar
        - region_code
        - difficulty_level
        - noble_score_impact
        - content_json

    ScenarioContent:
      type: object
      properties:
