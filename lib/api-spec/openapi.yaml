        - selected_option_index

    AnswerResult:
      type: object
      properties:
        correct:
          type: boolean
        explanation:
          type: string
        mentor_feedback:
          type: string
        score_delta:
          type: integer
        new_total_score:
          type: integer
        level_up:
          type: boolean
        new_level_name:
          type: string
          nullable: true
        new_unlock:
          nullable: true
          description: Newly unlocked wardrobe item if this submit triggered an unlock.
          type: object
          properties:
            id: { type: string }
            name: { type: string }
            region: { type: string }
            pillar: { type: integer }
            unlocked_at: { type: string }
          required: [id, name, region, pillar, unlocked_at]
        streak_milestone:
          type: integer
          nullable: true
          description: The streak day count if a milestone (3, 7, 14, 30) was just reached.
